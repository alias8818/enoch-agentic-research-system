<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Enoch social launch card</title>
  <desc id="desc">Social card for Enoch, an agentic research control plane.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07101f"/><stop offset="0.55" stop-color="#10172a"/><stop offset="1" stop-color="#090b16"/></linearGradient><linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7dd3fc"/><stop offset="1" stop-color="#c084fc"/></linearGradient><filter id="g"><feGaussianBlur stdDeviation="6"/><feComposite in2="SourceGraphic" operator="over"/></filter><style>.k{font:800 32px ui-sans-serif,system-ui,Segoe UI,sans-serif;fill:#7dd3fc;letter-spacing:.12em}.h{font:900 94px ui-sans-serif,system-ui,Segoe UI,sans-serif;fill:#edf3ff;letter-spacing:-6px}.s{font:600 32px ui-sans-serif,system-ui,Segoe UI,sans-serif;fill:#aebbd3}.b{fill:rgba(16,22,36,.78);stroke:rgba(255,255,255,.16);stroke-width:2}.m{font:800 23px ui-sans-serif,system-ui,Segoe UI,sans-serif;fill:#edf3ff}.t{font:500 18px ui-sans-serif,system-ui,Segoe UI,sans-serif;fill:#aebbd3}.line{stroke:url(#a);stroke-width:4;fill:none;opacity:.8}</style></defs>
  <rect width="1200" height="630" fill="url(#bg)"/><circle cx="200" cy="70" r="250" fill="#7dd3fc" opacity=".13"/><circle cx="1010" cy="80" r="280" fill="#c084fc" opacity=".13"/>
  <text x="70" y="105" class="k">AGENTIC RESEARCH CONTROL PLANE</text><text x="70" y="218" class="h">Enoch</text><text x="76" y="270" class="s">Queue safety · worker orchestration · evidence provenance</text>
  <g transform="translate(92 355)"><rect class="b" width="220" height="118" rx="24"/><text class="m" x="24" y="45">120 artifacts</text><text class="t" x="24" y="78">AI-generated corpus</text></g>
  <g transform="translate(362 355)"><rect class="b" width="220" height="118" rx="24"/><text class="m" x="24" y="45">Claim ledgers</text><text class="t" x="24" y="78">Limits + review state</text></g>
  <g transform="translate(632 355)"><rect class="b" width="220" height="118" rx="24"/><text class="m" x="24" y="45">Evidence</text><text class="t" x="24" y="78">Runs, metrics, notes</text></g>
  <g transform="translate(902 355)"><rect class="b" width="220" height="118" rx="24"/><text class="m" x="24" y="45">Open source</text><text class="t" x="24" y="78">GitHub + HF dataset</text></g>
  <path class="line" d="M308 414 H362 M578 414 H632 M848 414 H902"/><text x="76" y="560" class="t">Generated artifacts are inspectable outputs, not peer-reviewed scientific claims.</text>
</svg>
